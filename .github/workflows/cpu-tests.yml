name: CPU Tests

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

env:
  PYTHONPATH: src
  CUDA_VISIBLE_DEVICES: ""
  NUNCHAKU_LITE_RUN_FULL_INFERENCE: "0"
  NUNCHAKU_LITE_RUN_NATIVE_CUDA_TESTS: "0"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install lint tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install ruff

      - name: Run Ruff
        run: ruff check .

  test-discovery:
    name: Test Discovery
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install CPU test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install tomli
          python - <<'PY' > /tmp/project-deps.txt
          try:
              import tomllib
          except ModuleNotFoundError:
              import tomli as tomllib

          with open("pyproject.toml", "rb") as config:
              dependencies = tomllib.load(config)["project"]["dependencies"]

          for dependency in dependencies:
              if not dependency.startswith("torch"):
                  print(dependency)
          PY
          python -m pip install --index-url https://download.pytorch.org/whl/cpu "torch>=2.7"
          python -m pip install -r /tmp/project-deps.txt pytest

      - name: Collect tests
        run: pytest --collect-only -q

  cpu-tests:
    name: CPU Tests / Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    needs: test-discovery

    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install CPU test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install tomli
          python - <<'PY' > /tmp/project-deps.txt
          try:
              import tomllib
          except ModuleNotFoundError:
              import tomli as tomllib

          with open("pyproject.toml", "rb") as config:
              dependencies = tomllib.load(config)["project"]["dependencies"]

          for dependency in dependencies:
              if not dependency.startswith("torch"):
                  print(dependency)
          PY
          python -m pip install --index-url https://download.pytorch.org/whl/cpu "torch>=2.7"
          python -m pip install -r /tmp/project-deps.txt pytest

      - name: Run CPU tests
        run: pytest -q -m "not full_inference"

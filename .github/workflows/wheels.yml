name: Release Wheels

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  CUDA_VISIBLE_DEVICES: ""
  CIBUILDWHEEL_VERSION: "3.4.1"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install Ruff
        run: |
          python -m pip install --upgrade pip
          python -m pip install ruff

      - name: Run Ruff
        run: ruff check .

  validate-version:
    name: Validate Version
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate package version
        run: |
          python - <<'PY'
          import os
          from pathlib import Path

          version_locals = {}
          exec(Path("src/nunchaku_lite/__version__.py").read_text(), version_locals)
          version = version_locals["__version__"]
          event_name = os.environ["GITHUB_EVENT_NAME"]

          if event_name == "push":
              tag_version = os.environ["GITHUB_REF_NAME"].removeprefix("v")
              if "dev" in version:
                  raise SystemExit(f"Release tags must use a non-dev package version, got {version!r}.")
              if version != tag_version:
                  raise SystemExit(f"Package version {version!r} does not match tag {tag_version!r}.")

          print(f"package version: {version}")
          PY

  wheels:
    name: Wheels / Torch ${{ matrix.torch-version }} / ${{ matrix.cuda-tag }}
    runs-on: ubuntu-latest
    needs: validate-version

    strategy:
      fail-fast: false
      matrix:
        include:
          - torch-version: "2.9.1"
            cuda-tag: cu128
            cuda-version: "12.8"
          - torch-version: "2.9.1"
            cuda-tag: cu130
            cuda-version: "13.0"
          - torch-version: "2.10.0"
            cuda-tag: cu128
            cuda-version: "12.8"
          - torch-version: "2.10.0"
            cuda-tag: cu130
            cuda-version: "13.0"
          - torch-version: "2.11.0"
            cuda-tag: cu128
            cuda-version: "12.8"
          - torch-version: "2.11.0"
            cuda-tag: cu130
            cuda-version: "13.0"
          - torch-version: "2.12.0"
            cuda-tag: cu130
            cuda-version: "13.0"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install cibuildwheel
        run: |
          python -m pip install --upgrade pip
          python -m pip install "cibuildwheel==${CIBUILDWHEEL_VERSION}"

      - name: Build wheels
        env:
          CIBW_ENVIRONMENT_LINUX: >
            CUDA_HOME=/usr/local/cuda-${{ matrix.cuda-version }}
            CUDA_VISIBLE_DEVICES=""
            LD_LIBRARY_PATH=/usr/local/cuda-${{ matrix.cuda-version }}/lib64:$LD_LIBRARY_PATH
            NUNCHAKU_BUILD_WHEELS=1
            NUNCHAKU_CUDA_VERSION=${{ matrix.cuda-version }}
            NUNCHAKU_INSTALL_MODE=ALL
            NUNCHAKU_TORCH_CUDA_TAG=${{ matrix.cuda-tag }}
            NUNCHAKU_TORCH_VERSION=${{ matrix.torch-version }}
            PATH=/usr/local/cuda-${{ matrix.cuda-version }}/bin:$PATH
        run: python -m cibuildwheel --output-dir wheelhouse

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nunchaku-lite-wheels-torch-${{ matrix.torch-version }}-${{ matrix.cuda-tag }}
          path: wheelhouse/*.whl
          if-no-files-found: error

  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: wheels
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Attach artifacts to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          fail_on_unmatched_files: true

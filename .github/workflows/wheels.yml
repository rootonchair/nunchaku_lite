name: Release Wheels

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  CUDA_VISIBLE_DEVICES: ""
  CIBUILDWHEEL_VERSION: "3.4.1"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install Ruff
        run: |
          python -m pip install --upgrade pip
          python -m pip install ruff

      - name: Run Ruff
        run: ruff check .

  validate-version:
    name: Validate Version
    runs-on: ubuntu-latest
    needs: lint
    outputs:
      release-version: ${{ steps.validate.outputs.release-version }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate package version
        id: validate
        run: |
          python - <<'PY'
          import os
          from pathlib import Path

          version_locals = {}
          exec(Path("src/nunchaku_lite/__version__.py").read_text(), version_locals)
          version = version_locals["__version__"]
          event_name = os.environ["GITHUB_EVENT_NAME"]
          release_version = ""

          if event_name == "push":
              tag_version = os.environ["GITHUB_REF_NAME"].removeprefix("v")
              if version not in {tag_version, f"{tag_version}dev"}:
                  raise SystemExit(
                      f"Package version {version!r} must match tag {tag_version!r} "
                      f"or its dev version {tag_version + 'dev'!r}."
                  )
              release_version = tag_version

          print(f"package version: {version}")
          if release_version:
              print(f"release version: {release_version}")

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output_file:
              output_file.write(f"release-version={release_version}\n")
          PY

  wheels:
    name: Wheels / ${{ matrix.python_build }} / Torch ${{ matrix.torch_cuda.torch_version }} / ${{ matrix.torch_cuda.cuda_tag }}
    runs-on: ubuntu-latest
    needs: validate-version

    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        python_build:
          - cp310-manylinux_x86_64
          - cp311-manylinux_x86_64
          - cp312-manylinux_x86_64
          - cp313-manylinux_x86_64
        torch_cuda:
          - torch_version: "2.9.1"
            cuda_tag: cu128
            cuda_version: "12.8"
          - torch_version: "2.9.1"
            cuda_tag: cu130
            cuda_version: "13.0"
          - torch_version: "2.10.0"
            cuda_tag: cu128
            cuda_version: "12.8"
          - torch_version: "2.10.0"
            cuda_tag: cu130
            cuda_version: "13.0"
          - torch_version: "2.11.0"
            cuda_tag: cu128
            cuda_version: "12.8"
          - torch_version: "2.11.0"
            cuda_tag: cu130
            cuda_version: "13.0"
          - torch_version: "2.12.0"
            cuda_tag: cu130
            cuda_version: "13.0"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install cibuildwheel
        run: |
          python -m pip install --upgrade pip
          python -m pip install "cibuildwheel==${CIBUILDWHEEL_VERSION}"

      - name: Build wheels
        env:
          CIBW_BUILD: ${{ matrix.python_build }}
          CIBW_ENVIRONMENT_LINUX: >
            CC=/opt/rh/gcc-toolset-13/root/usr/bin/gcc
            CUDA_HOME=/usr/local/cuda-${{ matrix.torch_cuda.cuda_version }}
            CUDAHOSTCXX=/opt/rh/gcc-toolset-13/root/usr/bin/g++
            CUDA_VISIBLE_DEVICES=""
            CXX=/opt/rh/gcc-toolset-13/root/usr/bin/g++
            LD_LIBRARY_PATH=/usr/local/cuda-${{ matrix.torch_cuda.cuda_version }}/lib64:$LD_LIBRARY_PATH
            NUNCHAKU_BUILD_WHEELS=1
            NUNCHAKU_CUDA_VERSION=${{ matrix.torch_cuda.cuda_version }}
            NUNCHAKU_INSTALL_MODE=ALL
            NUNCHAKU_LITE_RELEASE_VERSION=${{ needs.validate-version.outputs.release-version }}
            NUNCHAKU_NVCC_THREADS=2
            NUNCHAKU_TORCH_CUDA_TAG=${{ matrix.torch_cuda.cuda_tag }}
            NUNCHAKU_TORCH_VERSION=${{ matrix.torch_cuda.torch_version }}
            MAX_JOBS=2
            PIP_NO_CACHE_DIR=1
            PATH=/usr/local/cuda-${{ matrix.torch_cuda.cuda_version }}/bin:$PATH
        run: python -m cibuildwheel --output-dir wheelhouse

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nunchaku-lite-wheels-${{ matrix.python_build }}-torch-${{ matrix.torch_cuda.torch_version }}-${{ matrix.torch_cuda.cuda_tag }}
          path: wheelhouse/*.whl
          if-no-files-found: error

  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: wheels
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Attach artifacts to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          fail_on_unmatched_files: true

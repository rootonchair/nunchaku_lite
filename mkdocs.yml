site_name: nunchaku_lite
site_description: Lite runtime for applying Nunchaku v2 quantized transformer weights to Diffusers pipelines.
site_url: https://nunchaku-lite.readthedocs.io/en/latest/
site_author: nunchaku_lite contributors

repo_url: https://github.com/rootonchair/nunchaku_lite
repo_name: rootonchair/nunchaku_lite
edit_uri: edit/main/docs/

theme:
  name: material
  language: en
  logo: assets/logo-symbol.svg
  favicon: assets/favicon.png
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: blue
      toggle:
        icon: material/brightness-2
        name: Switch to system preference
  features:
    - content.action.edit
    - content.code.copy
    - navigation.footer
    - navigation.indexes
    - navigation.instant
    - navigation.instant.progress
    - navigation.sections
    - navigation.tabs
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Home:
      - Overview: index.md
      - Installation: installation.md
      - Quick Start: quick_start.md
  - Documentation:
      - Overview: overview.md
      - Supported models:
          - FLUX.1: models/flux.md
          - FLUX.2 Klein: models/flux2.md
          - Qwen-Image: models/qwen_image.md
          - SDXL: models/sdxl.md
          - Z-Image Turbo: models/z_image.md
      - API Reference: api.md
      - Roadmap: roadmap.md
      - Documentation Deployment: deployment.md
  - Development: development.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/rootonchair/nunchaku_lite
